# docker-compose.yml — 로컬 테스트용
#
# 사용법:
#   .env 파일 생성 후 docker compose up
#   또는 환경변수 직접 지정: TELEGRAM_BOT_TOKEN=... docker compose up
#
# gcube 배포 시에는 워크로드 등록 화면에서 환경변수를 직접 입력

services:
  openclaw:
    image: ghcr.io/${GITHUB_REPOSITORY:-your-username/openclaw-base}:latest
    # 로컬 빌드 테스트 시:
    # build: .
    environment:
      # 필수
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_ALLOWED_USER_IDS=${TELEGRAM_ALLOWED_USER_IDS}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen3:8b}
      # 선택
      - GITHUB_USERNAME=${GITHUB_USERNAME:-}
      - GITHUB_EMAIL=${GITHUB_EMAIL:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GITHUB_REPO_URL=${GITHUB_REPO_URL:-}
    volumes:
      # Ollama 모델 캐시 유지 (컨테이너 재시작 시 재다운로드 방지)
      - ollama-models:/root/.ollama
      # gcube 클라우드 저장소는 워크로드 설정에서 /data/data 로 자동 마운트됨
      # 로컬 테스트 시 아래 주석 해제:
      # - ./data:/data/data
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  ollama-models:
