# .github/workflows/docker-publish.yml
#
# Docker 이미지를 빌드하여 GitHub Container Registry (ghcr.io) 에 push
#   mcp-hub → ghcr.io/<owner>/openclaw-mcp-hub :latest, :sha-<7자>
#
# References:
#   ghcr.io 인증:             https://docs.github.com/en/packages/working-with-a-github-packages-registry/working-with-the-container-registry
#   docker/build-push-action: https://github.com/docker/build-push-action
#
# Action 버전 (2025/2026 기준):
#   actions/checkout              @v6  (v6.0.2)
#   docker/setup-buildx-action   @v4  (v4.0.0)
#   docker/login-action          @v4  (v4.0.0)
#   docker/build-push-action     @v7  (v7.0.0)

name: Build and Push Docker Image

on:
  push:
    branches:
      - mcp-hub
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set image name
        id: image
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE="ghcr.io/${OWNER}/openclaw-mcp-hub"
          echo "tags=${IMAGE}:latest,${IMAGE}:sha-${SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.image.outputs.tags }}
          no-cache: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print image digest
        run: echo "Pushed ${{ steps.build.outputs.digest }}"
