# .github/workflows/docker-publish.yml
#
# Docker 이미지를 빌드하여 GitHub Container Registry (ghcr.io) 에 push
# 빌드 전 openclaw 최신 버전 및 릴리즈 노트를 README.md 에 자동 반영
#
# References:
#   ghcr.io 인증:           https://docs.github.com/en/packages/working-with-a-github-packages-registry/working-with-the-container-registry
#   docker/build-push-action: https://github.com/docker/build-push-action
#   docker/metadata-action:   https://github.com/docker/metadata-action
#
# Action 버전 (2025/2026 기준):
#   actions/checkout              @v6  (v6.0.2)
#   docker/setup-buildx-action   @v4  (v4.0.0)
#   docker/login-action          @v4  (v4.0.0)
#   docker/metadata-action       @v6  (v6.0.0)
#   docker/build-push-action     @v7  (v7.0.0)

name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - feature/agent-structure
    tags:
      - "v*.*.*"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Update OpenClaw version in README
        run: |
          OPENCLAW_VERSION=$(npm view openclaw version)
          BUILD_DATE=$(date '+%Y-%m-%d')

          # openclaw GitHub 릴리즈 노트 조회 (v 접두사 없는 경우 → 있는 경우 순으로 시도)
          RELEASE_BODY=$(curl -sf \
            "https://api.github.com/repos/openclaw/openclaw/releases/tags/${OPENCLAW_VERSION}" \
            | python3 -c "import json,sys; r=json.load(sys.stdin); print(r.get('body',''))" 2>/dev/null || true)

          if [ -z "$RELEASE_BODY" ]; then
            RELEASE_BODY=$(curl -sf \
              "https://api.github.com/repos/openclaw/openclaw/releases/tags/v${OPENCLAW_VERSION}" \
              | python3 -c "import json,sys; r=json.load(sys.stdin); print(r.get('body',''))" 2>/dev/null || true)
          fi

          OPENCLAW_VERSION="$OPENCLAW_VERSION" \
          BUILD_DATE="$BUILD_DATE" \
          RELEASE_BODY="$RELEASE_BODY" \
          python3 .github/scripts/update_readme.py

      - name: Commit updated README
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "docs: openclaw 버전 정보 자동 업데이트 [skip ci]"
          git push || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}},enable=${{ !startsWith(github.ref, 'refs/tags/v0.') }}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
          flavor: |
            latest=false

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print image digest
        run: echo "Pushed ${{ steps.build.outputs.digest }}"
