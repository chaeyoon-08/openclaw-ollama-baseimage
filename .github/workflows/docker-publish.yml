# .github/workflows/docker-publish.yml
#
# Docker 이미지를 빌드하여 GitHub Container Registry (ghcr.io) 에 push
# 브랜치별 이미지 이름 및 태그:
#   main        → ghcr.io/<owner>/openclaw-bot          :latest, :YYYY.MM.DD, :sha-<7자>
#   skills      → ghcr.io/<owner>/openclaw-bot-skills   :skills, :skills-YYYY.MM.DD, :sha-<7자>
#   multi-agent → ghcr.io/<owner>/openclaw-bot-multi    :latest, :sha-<7자>
#   agent-kit   → ghcr.io/<owner>/openclaw-bot-agentkit :agent-kit, :agent-kit-YYYY.MM.DD, :sha-<7자>
#
# References:
#   ghcr.io 인증:             https://docs.github.com/en/packages/working-with-a-github-packages-registry/working-with-the-container-registry
#   docker/build-push-action: https://github.com/docker/build-push-action
#   docker/metadata-action:   https://github.com/docker/metadata-action
#
# Action 버전 (2025/2026 기준):
#   actions/checkout              @v6  (v6.0.2)
#   docker/setup-buildx-action   @v4  (v4.0.0)
#   docker/login-action          @v4  (v4.0.0)
#   docker/metadata-action       @v6  (v6.0.0)
#   docker/build-push-action     @v7  (v7.0.0)

name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - skills
      - multi-agent
      - agent-kit
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set image name and tag prefix by branch
        id: image
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          BRANCH="${GITHUB_REF#refs/heads/}"
          BUILD_DATE=$(date '+%Y.%m.%d')

          case "$BRANCH" in
            main)
              IMAGE_NAME="${OWNER}/openclaw-bot"
              TAG_PREFIX=""
              ;;
            skills)
              IMAGE_NAME="${OWNER}/openclaw-bot-skills"
              TAG_PREFIX="skills"
              ;;
            multi-agent)
              IMAGE_NAME="${OWNER}/openclaw-bot-multi"
              TAG_PREFIX="multi-agent"
              ;;
            agent-kit)
              IMAGE_NAME="${OWNER}/openclaw-bot-agentkit"
              TAG_PREFIX="agent-kit"
              ;;
            *)
              IMAGE_NAME="${OWNER}/openclaw-bot"
              TAG_PREFIX=""
              ;;
          esac

          echo "name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "prefix=${TAG_PREFIX}" >> "$GITHUB_OUTPUT"
          echo "date=${BUILD_DATE}" >> "$GITHUB_OUTPUT"

      - name: Update OpenClaw version in README
        run: |
          OPENCLAW_VERSION=$(npm view openclaw version)
          BUILD_DATE=$(date '+%Y-%m-%d')

          OPENCLAW_VERSION="$OPENCLAW_VERSION" \
          BUILD_DATE="$BUILD_DATE" \
          python3 .github/scripts/update_readme.py

      - name: Commit updated README
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "docs: openclaw 버전 정보 자동 업데이트 [skip ci]"
          git push || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build tags
        id: tags
        run: |
          REGISTRY="${{ env.REGISTRY }}"
          IMAGE="${REGISTRY}/${{ steps.image.outputs.name }}"
          PREFIX="${{ steps.image.outputs.prefix }}"
          DATE="${{ steps.image.outputs.date }}"
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          BRANCH="${GITHUB_REF#refs/heads/}"

          if [ -z "$PREFIX" ]; then
            # main 브랜치
            TAGS="${IMAGE}:latest,${IMAGE}:${DATE},${IMAGE}:sha-${SHA}"
          elif [ "$BRANCH" = "multi-agent" ]; then
            # multi-agent 브랜치: :latest + :sha-xxx 두 태그만
            TAGS="${IMAGE}:latest,${IMAGE}:sha-${SHA}"
          else
            TAGS="${IMAGE}:${PREFIX},${IMAGE}:${PREFIX}-${DATE},${IMAGE}:sha-${SHA}"
          fi

          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print image digest
        run: echo "Pushed ${{ steps.build.outputs.digest }}"
