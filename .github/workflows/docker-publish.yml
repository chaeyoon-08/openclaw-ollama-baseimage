# .github/workflows/docker-publish.yml
#
# Docker 이미지를 빌드하여 GitHub Container Registry (ghcr.io) 에 push
#
# References:
#   ghcr.io 인증:           https://docs.github.com/en/packages/working-with-a-github-packages-registry/working-with-the-container-registry
#   docker/build-push-action: https://github.com/docker/build-push-action
#   docker/metadata-action:   https://github.com/docker/metadata-action
#
# Action 버전 (2025/2026 기준):
#   actions/checkout              @v6  (v6.0.2)
#   docker/setup-buildx-action   @v4  (v4.0.0)
#   docker/login-action          @v4  (v4.0.0)
#   docker/metadata-action       @v6  (v6.0.0)
#   docker/build-push-action     @v7  (v7.0.0)

name: Build and Push Docker Image

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}},enable=${{ !startsWith(github.ref, 'refs/tags/v0.') }}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
          flavor: |
            latest=false

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print image digest
        run: echo "Pushed ${{ steps.build.outputs.digest }}"
